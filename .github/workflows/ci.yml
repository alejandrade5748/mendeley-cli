name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch / PR to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Latest 2 LTS lines (Node 22 maintenance, Node 24 active LTS).
        # Node 18 and 20 are EOL.
        node: ["22", "24"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  prettier:
    name: Prettier (changed files)
    # Run only on PRs to keep noise out of push runs; depends on the test job
    # so a failing test run doesn't get hidden by an unrelated prettier pass.
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting on changed files
        run: |
          # Lint only files changed in this PR (vs the merge base) so historical
          # formatting drift doesn't block the PR.
          BASE=${{ github.base_sha }}
          HEAD=${{ github.head_sha }}
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" \
            | grep -E '\.(js|json|md|yml|yaml)$' \
            | grep -vE '^(package-lock\.json|node_modules/)' || true)
          if [ -z "$FILES" ]; then
            echo "No changed files to check; skipping."
            exit 0
          fi
          echo "Checking: $FILES"
          npx --yes prettier --check $FILES
