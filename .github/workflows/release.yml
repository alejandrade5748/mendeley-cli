name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  NODE_VERSION: "22"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Extract version from tag
        id: version
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          VERSION=${CURRENT_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$CURRENT_TAG" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          else
            echo "package.json already at $VERSION"
          fi

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${{ steps.version.outputs.tag }}
          CURRENT_VERSION=${{ steps.version.outputs.version }}

          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log $PREV_TAG..$CURRENT_TAG --oneline --format="• %s (%h)")
            COMPARE="See the [full changelog](https://github.com/VictorTomaili/mendeley-cli/compare/$PREV_TAG..$CURRENT_TAG) on GitHub."
          else
            LOG=$(git log --oneline --format="• %s (%h)")
            COMPARE=""
          fi

          # Write to file (avoids heredoc/EOF conflicts)
          tee changelog.md << EOF
          ## Changes since $PREV_TAG

          $LOG

          ## Installation

          \`\`\`bash
          npm install -g mendeley-cli@$CURRENT_VERSION
          \`\`\`

          Or:

          \`\`\`bash
          npm install mendeley-cli@$CURRENT_VERSION
          \`\`\`

          $COMPARE
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          printf '//registry.npmjs.org/:_authToken=%s\n' '${{ secrets.NPM_TOKEN }}' > .npmrc
          npm publish --access public
