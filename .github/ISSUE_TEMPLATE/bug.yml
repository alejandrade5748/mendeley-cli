name: Bug report
description: Report something that is broken or behaves unexpectedly.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in the details below.
        **Filing from an LLM or coding agent?** See
        [LLM_ISSUE_REPORTING.md](../../blob/main/.github/LLM_ISSUE_REPORTING.md)
        for a machine-actionable checklist (triage, data collection, redaction, `gh` commands).
        If this is a **security issue**, do **not** file it here — see
        [SECURITY.md](../../blob/main/SECURITY.md) for private reporting.

  - type: input
    id: cli-version
    attributes:
      label: mendeley-cli version
      description: "Run `mendeley --version` and paste the output here."
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Run `node --version` and paste the output here."
      placeholder: "v22.4.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - WSL
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command that failed
      description: "The exact `mendeley ...` invocation, with arguments."
      placeholder: |
        mendeley library list --limit 10
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What you expected to happen."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened. Paste the full error output, including any stack trace."
      render: bash
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "Minimal sequence to reproduce the bug."
      placeholder: |
        1. Configure credentials with `mendeley auth set clientId ...`
        2. Run `mendeley auth login`
        3. ...
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: "Anything else relevant — config files, workarounds, related issues."
    validations:
      required: false
