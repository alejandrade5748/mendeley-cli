name: Feature request
description: Suggest a new command, option, or behaviour.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like. **Filing from an LLM or coding agent?**
        See [LLM_ISSUE_REPORTING.md](../../blob/main/.github/LLM_ISSUE_REPORTING.md)
        for triage and redaction guidance. For security issues, see
        [SECURITY.md](../../blob/main/SECURITY.md) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this feature solve? What workflow is currently awkward or missing?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "Describe the command, option, or behaviour you would like. Concrete examples are very helpful."
      placeholder: |
        Add a new subcommand:

        ```
        mendeley catalog cite <documentId> --format bibtex
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any other approaches you considered, and why this one is better."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Screenshots, mockups, links to upstream Mendeley API docs, related issues, etc."
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: Are you willing to submit a PR?
      options:
        - "Yes, I can implement this"
        - "No, just suggesting"
        - "Maybe, with guidance"
    validations:
      required: true
